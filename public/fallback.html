<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Servicio temporalmente no disponible</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      color: #202020;
    }
    main {
      width: min(680px, calc(100% - 40px));
      background: white;
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,.10);
      padding: 34px;
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { margin: 0; line-height: 1.55; color: #555; }
    small { display: block; margin-top: 24px; color: #888; }
  </style>
</head>
<body>
  <main>
    <h1>Servicio temporalmente no disponible</h1>
    <p>Estamos usando una página de respaldo mientras se recupera el servicio principal.</p>
    <small>LK Failover activo</small>
  </main>
</body>
</html>
